name: Proxy Checker

on:
  schedule:
    # Запуск каждые 6 часов (можно настроить под себя)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Позволяет запускать вручную через вкладку Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests netaddr

      - name: Run proxy sorter
        run: python sources/proxy_checker.py  # Предполагается, что ваш скрипт называется main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add white_list.txt black_list.txt
          # Коммитим только если есть изменения, чтобы не плодить пустые экшены
          git diff --quiet && git diff --staged --quiet || git commit -m "Update proxy lists: $(date +'%Y-%m-%d %H:%M')"
          git push
