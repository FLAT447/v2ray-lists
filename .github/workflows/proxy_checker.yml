name: Proxy Checker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Устанавливаем часовой пояс для всей виртуальной машины
    env:
      TZ: Europe/Moscow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests netaddr

      - name: Run proxy sorter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        # Убедитесь, что файл лежит в папке sources/
        run: python sources/proxy_checker.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Исправлено: теперь имена совпадают с тем, что генерирует скрипт
          git add whitelist.txt blacklist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update proxy lists: $(date +'%Y-%m-%d %H:%M')"
          git push
