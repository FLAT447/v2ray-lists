name: Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: cd sources && pip install --no-cache-dir -r requirements.txt

      - name: Run script
        env:
          MY_TOKEN: ${{ secrets.VPN_TOKEN }}
        run: |
          cd sources && python main.py
