name: Update VPN Configs

on:
  schedule:
    - cron: '*/9 * * * *' # Запуск каждые 6 часов
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # Указываем путь к requirements.txt внутри папки sources
          pip install -r sources/requirements.txt

      - name: Run script
        env:
          MY_TOKEN: ${{ secrets.VPN_TOKEN }}
        run: |
          # Запускаем скрипт из папки sources
          python sources/mai
          n.py
