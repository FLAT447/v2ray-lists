name: Automated VPN Config Collector

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests PyGithub async-lru

      - name: Install Sing-Box (Core Validation)
        run: |
          set -euo pipefail
          VERSION=$(curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/SagerNet/sing-box/releases/latest | \
            grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')

          if [ -z "$VERSION" ]; then
            echo "❌ Не удалось получить версию sing-box из GitHub API"
            exit 1
          fi
          echo "Installing sing-box v$VERSION..."

          URL="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz"
          echo "Downloading: $URL"

          curl -Lf -o sing-box.tar.gz "$URL"

          SIZE=$(stat -c%s sing-box.tar.gz)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "❌ Подозрительно маленький файл ($SIZE байт), скорее всего не архив"
            cat sing-box.tar.gz
            exit 1
          fi

          tar -xzf sing-box.tar.gz
          mv sing-box-*-linux-amd64/sing-box ./sing-box
          chmod +x ./sing-box
          ./sing-box version

      - name: Run VPN Collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITVERSE_TOKEN: ${{ secrets.GITVERSE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python sources/vpn_checker.py
